; ═══════════════════════════════════════════════════════════════════════════
;  BeamStalker - cross-platform firmware skeleton
;  Targets: native (Linux debug) · lilygo-tpager (ESP32-S3, ST7796) · lilygo-t-dongle-s3 (ESP32-S3, ST7735)
; ═══════════════════════════════════════════════════════════════════════════

[platformio]
default_envs = native, native-headless, esp32s3-tpager, esp32s3-tdongle-s3, esp32s3-cardputer, esp32s3-heltec-v3
boards_dir = boards
src_dir = .

; ── Shared base config ────────────────────────────────────────────────────
[env]
lib_ldf_mode    = deep+
lib_compat_mode = off
lib_extra_dirs  = lib
extra_scripts   =
  pre:scripts/patch_libnet80211.py
  post:scripts/post_build.py

build_flags =
  -DBS_VERSION=\"0.3.18\"
  -DBS_FW_NAME=\"BeamStalker\"
  -DKONSOLE_FW_NAME=\"BeamStalker\"
  -DKONSOLE_FW_VERSION=\"0.3.18\"
  ; Include project headers
  -Isrc
  -Iinclude

; ── Native Linux debug ────────────────────────────────────────────────────
; Display  : ANSI full-screen terminal (80×24, block-char 5×7 font rendering)
; Input    : raw stdin
; Serial   : stderr  (stdout is owned by the display)
; Build    : pio run -e native && .pio/build/native/program
[env:native]
platform = native

build_flags =
  ${env.build_flags}
  -DVARIANT_NATIVE
  -Ivariant/native
  -DBS_GFX_NATIVE=1
  -DBS_KEYS_NATIVE=1
  -DBS_UART_BAUD=115200
  -I/usr/include/SDL2
  -D_REENTRANT
  -lSDL2
  -DBS_FS_NATIVE=1

build_src_filter =
  +<src/**>
  +<hal/**>
  +<arch/native/posix/**>

; ── Native headless (no SDL2, no display, konsole-only) ───────────────────
; Display  : no-op (bs_gfx_none.c — virtual 480×222)
; Input    : none (BS_KEYS_NATIVE still reads stdin for konsole use)
; Serial   : stdout
; Build    : pio run -e native-headless && .pio/build/native-headless/program
[env:native-headless]
platform = native

build_flags =
  ${env.build_flags}
  -DVARIANT_NATIVE
  -Ivariant/native
  -DBS_HEADLESS=1
  -DBS_UART_BAUD=115200
  -DBS_FS_NATIVE=1

build_src_filter =
  +<src/**>
  +<hal/**>
  +<arch/native/posix/**>

; ── LilyGO T-Pager ────────────────────────────────────────────────────────
; Display  : ST7796 480×222 SPI (SGFX framebuffer + dirty-tile presenter)
; Input    : TCA8418 keyboard + rotary encoder (SIC)
; Serial   : UART0 @ 115200 (USB-CDC on ESP32-S3)
; Build    : pio run -e esp32s3-tpager -t upload
[env:esp32s3-tpager]
platform                   = espressif32
board                      = esp32-s3-devkitc-1
framework                  = arduino
; T-Pager PSRAM note: qio_opi CANNOT be used because OPI mode requires GPIO35-38
; for extra data lines (D4-D7), and GPIO37/38 are occupied by the display DC/CS
; pins — the OPI bootloader init leaves those in MSPI mode and breaks SPI bus.
; qio_qspi does not detect PSRAM either (chip rev0 / no embedded QSPI PSRAM).
; We operate without PSRAM; WiFi is initialised before SIC+SD (see beamstalker.c)
; so it gets a clean heap before the framebuffer fragmentation occurs.
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size    = 16MB
board_build.partitions     = partitions_16MB.csv
monitor_speed              = 115200
monitor_raw                = yes

build_flags =
  ${env.build_flags}
  -DARCH_ESP32
  -DPORT_ARDUINO
  -DVARIANT_TPAGER
  -Ivariant/lilygo-tpager
  -DBOARD_HAS_PSRAM          ; required: without this esp32-hal-psram.h undefines
                             ;           CONFIG_SPIRAM and psramInit() is never called
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBS_UART_CONSOLE_IDX=0
  -DBS_UART_BAUD=115200
  ; ── SGFX display ──────────────────────────────────────────────────
  -DBS_USE_SGFX
  -DSGFX_BUS_SPI=1
  -DSGFX_DRV_ST7796=1
  -DSGFX_W=480
  -DSGFX_H=222
  -DSGFX_ROT=3
  -DSGFX_PIN_SCK=35
  -DSGFX_PIN_MOSI=34
  -DSGFX_PIN_MISO=33
  -DSGFX_PIN_CS=38
  -DSGFX_PIN_DC=37
  -DSGFX_PIN_RST=-1
  -DSGFX_PIN_BL=42
  -DSGFX_SPI_HZ=80000000
  -DSGFX_SPI_CHUNK_BYTES=16384
  -DSGFX_HAL_ARDUINO_GENERIC=1
  -DSGFX_SCRATCH_BYTES=8192
  -DSGFX_ST7796_BGR=1
  -DSGFX_ST7796_INVERT=1
  -DSGFX_ST7796_COLSTART=49
  -DSGFX_ST7796_ROWSTART=0
  -DSGFX_ST7796_MIRROR_Y=1
  -DSGFX_RGB565_BYTESWAP=1
  ; ── SIC hardware peripherals ──────────────────────────────────────
  -DBS_USE_SIC
  -DSIC_AUDIO_NO_COMPAT
  -DI2C_SDA_PIN=3
  -DI2C_SCL_PIN=2
  -DTCA8418_INT_PIN=255
  -DSIC_DRV_KBD_TCA8418=1
  -DSIC_NO_DRV_KBD_74HC138=1
  -DSIC_BATTERY_BQ27220=1
  -DSIC_DRV_ENCODER_GPIO=1
  -DSIC_DRV_CODEC_ES8311=1
  -DES8311_MCLK_PIN=10
  -DES8311_BCLK_PIN=11
  -DES8311_WS_PIN=18
  -DES8311_DOUT_PIN=45
  -DES8311_DIN_PIN=17
  ; ── Keys ──────────────────────────────────────────────────────────
  -DBS_KEYS_SIC=1
  ; ── Filesystem ────────────────────────────────────────────────────
  -DBS_FS_SDCARD=1
  -DBS_SD_CS_PIN=21
  -DBS_SD_SCK_PIN=35
  -DBS_SD_MOSI_PIN=34
  -DBS_SD_MISO_PIN=33
  -DBS_SD_FREQ=20000000
  ; SPI bus peers — drive ALL CS HIGH before SD.begin() to avoid bus contention
  -DBS_LORA_CS_PIN=36
  -DBS_NFC_CS_PIN=39
  ; ── WiFi ──────────────────────────────────────────────────────────
  -DBS_WIFI_ESP32=1
  ; ── Bluetooth ─────────────────────────────────────────────────────
  -DBS_BLE_ESP32=1

build_src_filter =
  +<src/**>
  -<src/main.c>
  +<hal/**>
  +<arch/esp32/arduino/**>

; ── LilyGO T-Dongle-S3 ────────────────────────────────────────────────
; Display  : ST7735 160×80 SPI via SGFX
; Input    : single BOOT key (short=next, double=back, long=enter)
; Serial   : USB-CDC @ 115200
; Build    : pio run -e esp32s3-tdongle-s3 -t upload
[env:esp32s3-tdongle-s3]
platform                   = espressif32@6.12.0
board                      = dongles3
framework                  = arduino
monitor_speed              = 115200
monitor_raw                = yes

build_flags =
  ${env.build_flags}
  -DARCH_ESP32
  -DPORT_ARDUINO
  -DVARIANT_TDONGLE_S3
  -Ivariant/lilygo-t-dongle-s3
  -DBS_UART_CONSOLE_IDX=0
  -DBS_UART_BAUD=115200
  ; ── SGFX display ──────────────────────────────────────────────────
  -DBS_USE_SGFX
  -DSGFX_BUS_SPI=1
  -DSGFX_DRV_ST7735=1
  -DSGFX_W=160
  -DSGFX_H=80
  -DSGFX_ROT=1
  -DSGFX_PIN_SCK=5
  -DSGFX_PIN_MOSI=3
  -DSGFX_PIN_MISO=-1
  -DSGFX_PIN_CS=4
  -DSGFX_PIN_DC=2
  -DSGFX_PIN_RST=1
  -DSGFX_PIN_BL=37
  -DSGFX_SPI_HZ=80000000
  -DSGFX_SPI_CHUNK_BYTES=16384
  -DSGFX_HAL_ARDUINO_GENERIC=1
  -DSGFX_SCRATCH_BYTES=8192
  -DSGFX_ST7735_COLSTART=26
  -DSGFX_ST7735_ROWSTART=1
  -DSGFX_ST77XX_BGR=1
  -DSGFX_ST77XX_INVERT=1
  -DSGFX_RGB565_BYTESWAP=1
  ; ── Minimal input ────────────────────────────────────────────────
  -DBS_KEYS_GPIO=1
  ; ── WiFi / Bluetooth ─────────────────────────────────────────────
  -DBS_WIFI_ESP32=1
  -DBS_BLE_ESP32=1

build_src_filter =
  +<src/**>
  -<src/main.c>
  +<hal/**>
  +<arch/esp32/arduino/**>


; ── M5Stack Cardputer v1.0 ─────────────────────────────────────────────
[env:esp32s3-cardputer]
platform                   = espressif32
board                      = esp32-s3-devkitc-1
framework                  = arduino
board_upload.flash_size    = 8MB
monitor_speed              = 115200
monitor_raw                = yes

build_flags =
  ${env.build_flags}
  -DARCH_ESP32
  -DPORT_ARDUINO
  -DVARIANT_CARDPUTER
  -Ivariant/m5stack-cardputer
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBS_UART_CONSOLE_IDX=0
  -DBS_UART_BAUD=115200
  ; ── SGFX display ──────────────────────────────────────────────────
  -DBS_USE_SGFX
  -DSGFX_BUS_SPI=1
  -DSGFX_DRV_ST7789=1
  -DSGFX_W=240
  -DSGFX_H=135
  -DSGFX_ROT=3
  -DSGFX_PIN_SCK=36
  -DSGFX_PIN_MOSI=35
  -DSGFX_PIN_MISO=-1
  -DSGFX_PIN_CS=37
  -DSGFX_PIN_DC=34
  -DSGFX_PIN_RST=33
  -DSGFX_PIN_BL=38
  -DSGFX_SPI_HZ=80000000
  -DSGFX_SPI_CHUNK_BYTES=16384
  -DSGFX_HAL_ARDUINO_GENERIC=1
  -DSGFX_SCRATCH_BYTES=8192
  -DSGFX_ST7789_COLSTART=53
  -DSGFX_ST7789_ROWSTART=40
  -DSGFX_RGB565_BYTESWAP=1
  ; ── SIC hardware peripherals ──────────────────────────────────────
  -DBS_USE_SIC
  -DSIC_AUDIO_NO_COMPAT
  -DSIC_TARGET_CARDPUTER=1
  -DI2C_SDA_PIN=2
  -DI2C_SCL_PIN=1
  -DMIC_DATA=46
  -DMIC_CLK=43
  -DIR_TX_PIN=44
  -DBAT_ADC_PIN=10
  -DBAT_DIV_K=2.0f
  ; Cardputer v1.0 keyboard matrix (M5Cardputer scan order)
  -DKBD_SEL0=8
  -DKBD_SEL1=9
  -DKBD_SEL2=11
  -DKBD_IN0=13
  -DKBD_IN1=15
  -DKBD_IN2=3
  -DKBD_IN3=4
  -DKBD_IN4=5
  -DKBD_IN5=6
  -DKBD_IN6=7
  -DKBD_IN7=0xFF
  -DKBD_PULL=UP
  -DKBD_ACTIVE_LOW=1
  -DKBD_DEBOUNCE_MS=20
  ; ── Keys ──────────────────────────────────────────────────────────
  -DBS_KEYS_SIC=1
  ; ── Filesystem ────────────────────────────────────────────────────
  -DBS_FS_SDCARD=1
  -DBS_SD_CS_PIN=12
  -DBS_SD_SCK_PIN=40
  -DBS_SD_MOSI_PIN=14
  -DBS_SD_MISO_PIN=39
  -DBS_SD_FREQ=20000000
  ; ── WiFi ──────────────────────────────────────────────────────────
  -DBS_WIFI_ESP32=1
  ; ── Bluetooth ─────────────────────────────────────────────────────
  -DBS_BLE_ESP32=1

build_src_filter =
  +<src/**>
  -<src/main.c>
  +<hal/**>
  +<arch/esp32/arduino/**>

; ── Heltec WiFi LoRa 32 V3 ──────────────────────────────────────────────
; Display  : SSD1306 128×64 I²C OLED via SGFX
; Input    : single PRG key (short=next, double=back, long=enter)
; Serial   : USB-CDC / UART0 @ 115200
; Build    : pio run -e esp32s3-heltec-v3 -t upload
[env:esp32s3-heltec-v3]
platform                   = espressif32
board                      = heltec_wifi_lora_32_V3
framework                  = arduino
monitor_speed              = 115200
monitor_raw                = yes

build_flags =
  ${env.build_flags}
  -DARCH_ESP32
  -DPORT_ARDUINO
  -DVARIANT_HELTEC_V3
  -Ivariant/heltec-v3
  -DBS_UART_CONSOLE_IDX=0
  -DBS_UART_BAUD=115200
  ; ── SGFX display ──────────────────────────────────────────────────
  -DBS_USE_SGFX
  -DSGFX_BUS_I2C=1
  -DSGFX_DRV_SSD1306=1
  -DSGFX_W=128
  -DSGFX_H=64
  -DSGFX_ROT=0
  -DSGFX_PIN_SDA=17
  -DSGFX_PIN_SCL=18
  -DSGFX_PIN_RST=21
  -DSGFX_PIN_BL=-1
  -DSGFX_I2C_ADDR=0x3C
  -DSGFX_I2C_HZ=400000
  -DSGFX_HAL_ARDUINO_GENERIC=1
  -DSGFX_SCRATCH_BYTES=1024
  ; ── Minimal input ────────────────────────────────────────────────
  -DBS_KEYS_GPIO=1
  ; ── WiFi / Bluetooth ─────────────────────────────────────────────
  -DBS_WIFI_ESP32=1
  -DBS_BLE_ESP32=1

build_src_filter =
  +<src/**>
  -<src/main.c>
  +<hal/**>
  +<arch/esp32/arduino/**>
