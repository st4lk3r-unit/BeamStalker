name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.16)'
        required: true
        type: string
      latest:
        description: 'Mark as latest release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [esp32s3-tpager, native, native-headless, esp32s3-cardputer, esp32s3-tdongle-s3]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.env }}-

      - name: Install SDL2 (native only)
        if: matrix.env == 'native'
        run: sudo apt-get update && sudo apt-get install --fix-missing -y libsdl2-dev

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build (${{ matrix.env }})
        working-directory: firmware
        run: pio run -e ${{ matrix.env }}

      - name: Locate artifact
        id: artifact
        working-directory: firmware
        shell: bash
        run: |
          case "${{ matrix.env }}" in
            esp32s3-tpager) SUFFIX="tpager" ;;
            *) SUFFIX="${{ matrix.env }}" ;;
          esac

          BIN="$(ls bin/BeamStalker-*-${SUFFIX}.bin 2>/dev/null | head -1)"
          if [ -z "$BIN" ]; then
            BIN="$(ls bin/BeamStalker-*.bin 2>/dev/null | head -1)"
          fi

          if [ -z "$BIN" ]; then
            echo "No build artifact found" >&2
            exit 1
          fi

          echo "path=firmware/${BIN}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$BIN")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: BeamStalker ${{ inputs.tag }}
          body_path: RELEASE.md
          files: artifacts/*
          draft: false
          prerelease: false
          make_latest: ${{ inputs.latest && 'true' || 'false' }}
